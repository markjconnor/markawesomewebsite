        <script>
            const dropdown = document.querySelector('.dropdown');
            const dropdownContent = document.querySelector('.dropdown-content');

            dropdown.addEventListener('click', () => {
                dropdownContent.classList.toggle('show');
            });

            window.addEventListener('click', (event) => {
                if (!event.target.matches('.dropbtn') && !event.target.matches('.dropbtn img')) {
                    if (dropdownContent.classList.contains('show')) {
                        dropdownContent.classList.remove('show');
                    }
                }
            });

    async function fetchRuneScapeStats() {
        try {
            const response = await fetch('https://api.wiseoldman.net/v2/players/zombiebear88');
            if (!response.ok) throw new Error('WOM API Response Error');
            
            const data = await response.json();
            
            const skills = data.latestSnapshot.data.skills;
            
            if (skills) {
                document.getElementById('osrs-ranged').textContent = skills.ranged.level;
                document.getElementById('osrs-strength').textContent = skills.strength.level;
                document.getElementById('osrs-slayer').textContent = skills.slayer.level;
            }
        } catch (error) {
            console.error("Failed to load RuneScape stats dynamically:", error);
        }
    }

    async function fetchChessStats() {
        try {
            const response = await fetch('https://api.chess.com/pub/player/mark983511/stats');
            if (!response.ok) throw new Error('Chess API Response Error');
            
            const data = await response.json();
            
        
            if (data.chess_rapid && data.chess_rapid.last) {
                document.getElementById('chess-rapid').textContent = data.chess_rapid.last.rating;
            }
        } catch (error) {
            console.error("Failed to load Chess stats dynamically:", error);
        }
    }

    async function fetchTypeRacerStats() {
        try {
            const proxyUrl = 'https://typeracer.mark-connor2003.workers.dev/';
            const targetUrl = 'https://data.typeracer.com/users?id=tr:jay_cartwright';
            
            const response = await fetch(proxyUrl + encodeURIComponent(targetUrl));
            if (!response.ok) throw new Error('TypeRacer Response Error');
            
            const data = await response.json();
            

            if (data.tstats && data.tstats.recentAvgWpm) {
                document.getElementById('tr-wpm').textContent = Math.round(data.tstats.recentAvgWpm);
            }
        } catch (error) {
            console.error("TypeRacer Error:", error);
        }
    }

    document.addEventListener("DOMContentLoaded", () => {
        fetchRuneScapeStats();

            description: "Exclusive look at Ruby's art skills. So awesome." 
        },
    ];

    let showingAllArt = false;

    function initArtGallery() {
        const seeAllBtn = document.getElementById('see-all-art-btn');
        const artModal = document.getElementById('art-modal');
        const artModalClose = document.getElementById('art-modal-close');

        renderArtGallery();

        seeAllBtn.addEventListener('click', () => {
            showingAllArt = !showingAllArt;
            renderArtGallery();
        });

        artModalClose.addEventListener('click', closeArtModal);
        artModal.addEventListener('click', (event) => {
            if (event.target === artModal) closeArtModal();
        });
        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeArtModal();
        });
    }

    function renderArtGallery() {
        const artGrid = document.getElementById('art-grid');
        const seeAllBtn = document.getElementById('see-all-art-btn');

        const piecesToShow = showingAllArt
            ? artPieces.slice().reverse()
            : artPieces.slice(-3).reverse();

        artGrid.innerHTML = '';

        piecesToShow.forEach((art) => {
            const item = document.createElement('div');
            item.className = 'art-item';
            item.innerHTML = `
                <div class="art-image-wrapper">
                    <img src="${art.src}" alt="${art.title}" loading="lazy">
                </div>
                <div class="art-caption">
                    <h4 class="art-piece-title">${art.title}</h4>
                    <div class="art-piece-artist">${art.artist}</div>
                </div>
            `;
            item.addEventListener('click', () => openArtModal(art));
            artGrid.appendChild(item);
        });

        seeAllBtn.textContent = showingAllArt ? 'Show less' : 'See all art';
        seeAllBtn.style.display = artPieces.length > 3 ? 'inline-block' : 'none';
    }

    function openArtModal(art) {
        document.getElementById('art-modal-img').src = art.src;
        document.getElementById('art-modal-img').alt = art.title;
        document.getElementById('art-modal-title').textContent = art.title;
        document.getElementById('art-modal-artist').textContent = 'by ' + art.artist;
        document.getElementById('art-modal-description').textContent = art.description;
        document.getElementById('art-modal').classList.add('show');
    }

    function closeArtModal() {
        document.getElementById('art-modal').classList.remove('show');
    }
