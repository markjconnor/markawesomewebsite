<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mark's Awesome Website | Video Player Dashboard</title>
    <link rel="icon" type="image/png" href="./media/lebron.png" sizes="480x480">
    <link rel="stylesheet" href="style.css">
    <style>

        html, body {
            margin: 0 !important;
            padding: 0 !important;
            background-image: url("./media/spacebackground.jpg") !important; 
            background-color: #24292e !important;
            text-transform: none !important;
        }

        .header {
            height: 60px; 
            display: block;
            margin-bottom: 20px;
        }

        .dashboard-layout {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 90px;
            max-width: 1100px;
            margin: 0 auto 50px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .left-column {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 600px; 
        }

        .wmp-canvas-container {
            position: relative;
            width: 655px;
            height: 593px;
            background-image: url("./media/windows-wmp.png");
            background-repeat: no-repeat;
            background-size: 100%, 100%;
        }

        .wmp-video-overlay {
            position: absolute;
            top: 59px;
            left: 74px;
            width: 492px;
            height: 366px;
            background: #000000;
        }

        .wmp-video-overlay iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-description-overlay {
            position: relative;
            width: 100%;
            height: 300px;
            background-image: url("./media/microsoft-notes.png");
            background-size: 150% 100%;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 6px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .commentary-scroll-viewport {
            position: absolute;
            top: 15px;      
            left: 15px;     
            right: 15px;    
            bottom: 15px;   
            overflow-y: auto;
            color: #000000;
            font-family: Arial, sans-serif;
            text-align: left;
        }

        .commentary-scroll-viewport h4 {
            margin: 0 0 8px 0;
            font-size: 15px;
            color: #0033CC;
            border-bottom: 1px solid #d4d0c8;
            padding-bottom: 4px;
        }

        .commentary-scroll-viewport p {
            margin: 0;
            font-size: 13px;
            line-height: 1.5;
        }

        .related-videos-overlay {
            position: relative;
            width: 380px;
            height: 547px; 
            background-image: url("./media/microsoft-tab.png");
            background-size: 145% 100%;
            background-repeat: no-repeat;
            background-position: center;
            border-radius: 6px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .sidebar-scroll-viewport {
            position: absolute;
            top: 49px;    
            left: 4px;    
            right: 6px;   
            bottom: 12px;  
            overflow-y: auto;
            padding-right: 4px;
            box-sizing: border-box;
        }

        .sidebar-scroll-viewport::-webkit-scrollbar {
            width: 12px;
        }
        .sidebar-scroll-viewport::-webkit-scrollbar-track {
            background: #f1f0e6; 
        }
        .sidebar-scroll-viewport::-webkit-scrollbar-thumb {
            background: #cdd2dc; 
            border: 2px solid #f1f0e6;
            border-radius: 2px;
        }
        .sidebar-scrool

        .retro-video-row {
            display: flex;
            gap: 10px;
            padding: 8px;
            border-bottom: 1px solid #d4d0c8; 
            cursor: pointer;
            transition: background 0.15s ease-in-out;
            border-radius: 4px;
            margin-bottom: 4px;
        }
        .retro-video-row:hover {
            background-color: rgba(31, 41, 61, 0.08); 
            cursor: url("./media/cursors/Link.cur")
        }
        .retro-video-row.active {
            background-color: rgba(31, 41, 61, 0.15); 
            border: 1px solid #388bfd;
        }

        .retro-thumb-wrapper {
            position: relative;
            width: 100px;
            height: 75px;
            flex-shrink: 0;
            border: 1px solid #7f7f7f;
            background-color: #000000;
            border-radius: 3px;
            overflow: hidden;
        }
        .retro-thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .retro-video-meta {
            filter: blur(1.0);
            font-family: Times, Arial, sans-serif;
            text-align: left;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .retro-video-title {
            font-size: 13px;
            font-weight: bold;
            color: #0033CC;
            margin-bottom: 4px;
            line-height: 1.3;
        }
        .retro-video-author {
            font-size: 11px;
            color: #4c4c4c;
            margin-bottom: 2px;
        }
        .retro-video-views {
            font-size: 11px;
            color: #4c4c4c;
        }
    </style>
</head>
<body>
    <div maincontainer>

        <header class="header">
            <div class="dropdown">
                <button class="dropbtn">
                    Check out my Website
                    <span class="seperator">      |</span>
                    <img src="./media/dropdown.png" alt="Dropdown" class="dropbtn">
                </button>
                <div class="dropdown-content">
                    <a href="index.html">Home</a>
                    <a href="art.html">Art Board</a>
                    <a href="youtube.html">Youtube Videos</a>
                    <a class="blog" href="blog.html">Blog</a>
                    <a href="https://tagpro.koalabeast.com/" target="_blank">Cool Game</a>
                    <div class="social-icons">
                        <div class="HeaderSocials">
                            <ul class="socials">
                                <li><a href="https://www.github.com/markjconnor/" target="_blank"><img src="./media/github.png" alt="GitHub"></a></li>
                                <li><a href="https://www.linkedin.com/in/mark-connor2003/" target="_blank"><img src="./media/linkedin.png" alt="LinkedIn"></a></li>
                                <li><a href="https://www.instagram.com/" target="_blank"><img src="./media/instagram.png" alt="Instagram"></a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <div class="dashboard-layout">
            
            <div class="left-column">
                <div class="wmp-canvas-container">
                    <div class="wmp-video-overlay">
                        <iframe id="main-player" src="" allowfullscreen></iframe>
                    </div>
                </div>

                <!--<div class="video-description-overlay" id="video-desc-box">
                    </div>-->
            </div>

            <div class="related-videos-overlay">
                <div class="sidebar-scroll-viewport" id="sidebar-list">
                </div>
            </div>

        </div>

        <script>
            const dropdown = document.querySelector('.dropdown');
            const dropdownContent = document.querySelector('.dropdown-content');

            dropdown.addEventListener('click', () => {
                dropdownContent.classList.toggle('show');
            });

            window.addEventListener('click', (event) => {
                if (!event.target.matches('.dropbtn') && !event.target.matches('.dropbtn img')) {
                    if (dropdownContent.classList.contains('show')) {
                        dropdownContent.classList.remove('show');
                    }
                }
            });

            // Video Collection - pulls thumbnail from youtube automatically
            const myVideos = [
                
                {
                    embedId: "CF3P9E8Nst0",
                    title: "Overacting Bullets",
                    author: "BaratsAndBereta",
                    views: "1,054,586",
                    thoughts: ""
                },
                {
                    embedId: "w6vVS6v58II",
                    title: "DJ Akademiks Computer Breaks Down on Livestream",
                    author: "Twitch Twist",
                    views: "912,550",
                    thoughts: ""
                },
                {
                    embedId: "LgRqYh7Aivg",
                    title: "aluno do dante tenta falar em inglês",
                    author: "Desativado",
                    views: "5,806,959",
                    thoughts: ""
                },
                {
                    embedId: "qo9QecE40-c",
                    title: "WRIGHT'S LAW | Omeleto",
                    author: "Omeleto",
                    views: "2,553,491",
                    thoughts: ""
                },
                {
                    embedId: "BsfrhnMDKO8", 
                    title: "Charles Jackson - I'm Gonna Get Your Love (12 inch 1979)",
                    author: "Coolfunk Zézé 2",
                    views: "27,136",
                    thoughts: ""
                },
                {
                    embedId: "BqSxjmvXzzY",
                    title: "57 Years Apart - A Boy And a Man Talk About Life",
                    author: "Facts.",
                    views: "41,561,450",
                    thoughts: ""
                },

                {
                    embedId: "FZz-3eUJlYo", 
                    title: "Funny League of Ireland Fan",
                    author: "Brienzah",
                    views: "83,778",
                    thoughts: ""
                },
                {
                    embedId: "lzQDQxug4Eo", 
                    title: "Zack Fox & Earl Sweatshirt interview 😂",
                    author: "LonelyMan2007",
                    views: "271,881",
                    thoughts: ""
                },
                {
                    embedId: "v3UXBJtZE8I",
                    title: "Tyler Shows Off His Dinner",
                    author: "tyler1 highlights",
                    views: "9,141,799",
                    thoughts: ""
                }
            ];

            function loadVideoIndex(index) {
                const video = myVideos[index];
                
                document.getElementById('main-player').src = `https://www.youtube.com/embed/${video.embedId}?autoplay=0&rel=0`;
                
                document.getElementById('video-desc-box').innerHTML = `
                    <h4>Mark's Commentary</h4>
                    <p>${video.thoughts}</p>
                `;

                document.querySelectorAll('.retro-video-row').forEach((row, idx) => {
                    if(idx === index) row.classList.add('active');
                    else row.classList.remove('active');
                });
            }

            function initializeSidebar() {
                const listContainer = document.getElementById('sidebar-list');
                listContainer.innerHTML = ''; 

                myVideos.forEach((video, index) => {
                    const row = document.createElement('div');
                    row.className = 'retro-video-row';
                    row.onclick = () => loadVideoIndex(index);

                    const liveThumbnailUrl = `https://img.youtube.com/vi/${video.embedId}/mqdefault.jpg`;

                    row.innerHTML = `
                        <div class="retro-thumb-wrapper">
                            <img src="${liveThumbnailUrl}" alt="${video.title}">
                        </div>
                        <div class="retro-video-meta">
                            <div class="retro-video-title">${video.title}</div>
                            <div class="retro-video-author">From: ${video.author}</div>
                            <div class="retro-video-views">Views: ${video.views}</div>
                        </div>
                    `;
                    listContainer.appendChild(row);
                });

                if(myVideos.length > 0) loadVideoIndex(0);
            }

            document.addEventListener("DOMContentLoaded", initializeSidebar);
        </script>
    </div>
</body>
</html>
